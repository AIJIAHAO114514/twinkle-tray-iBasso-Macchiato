name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        shell: pwsh
        run: |
          $env:CL = "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
          npm ci

      - name: Build and package (disable auto-publish)
        run: |
          npm run parcel-build
          npm run electron-build -- --publish never

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Twinkle Tray v*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}