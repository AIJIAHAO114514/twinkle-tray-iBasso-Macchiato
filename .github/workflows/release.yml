name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        shell: pwsh
        run: |
          $env:CL = "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
          # 先安装依赖，跳过 postinstall（electron-builder install-app-deps），
          # 因为某些 package.json 可能包含 BOM 头导致 JSON 解析失败
          npm ci --ignore-scripts

          # 清理 node_modules 中所有 package.json 的 BOM 头（U+FEFF）
          Get-ChildItem -Recurse -Filter 'package.json' -Path node_modules | ForEach-Object {
              $content = [System.IO.File]::ReadAllText($_.FullName)
              if ($content.Length -gt 0 -and [int]$content[0] -eq 0xFEFF) {
                  $clean = $content.Substring(1)
                  [System.IO.File]::WriteAllText($_.FullName, $clean, [System.Text.UTF8Encoding]::new($false))
                  Write-Host "✓ Fixed BOM in $($_.FullName)"
              }
          }

          # 手动运行 postinstall（electron-builder install-app-deps）——此时已无 BOM
          npm run postinstall

      - name: Build and package (disable auto-publish)
        run: |
          # 用 git tag 版本号覆盖 package.json
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          npm version $ver --no-git-tag-version --allow-same-version
          npm run parcel-build
          npm run electron-build -- --publish never

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/v*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
