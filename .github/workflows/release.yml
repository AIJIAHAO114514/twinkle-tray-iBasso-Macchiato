name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    # 不再需要 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24（因为下面用的 Action 已原生支持 Node 24）
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5        # 升级到 v5

      - name: Setup Node.js
        uses: actions/setup-node@v5      # 升级到 v5
        with:
          node-version: '24'             # 仍用 Node 20 构建项目（可根据需要改为 24）

      - name: Install dependencies
        shell: pwsh
        run: |
          $env:CL = "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
          npm ci

      - name: Build and package (disable auto-publish)
        run: |
          npm run parcel-build
          npm run electron-build -- --publish never

      - name: Upload to Release
        uses: softprops/action-gh-release@v2  # v2 最新版已支持 Node 24，无需改动
        with:
          files: dist/Twinkle Tray v*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
